name: Fetch CSV Data

on:
  schedule:
    # 00:00 UTC+8 = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  BRANCH: ci/chore-data

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare ci/chore-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          REMOTE_EXISTS=$(git ls-remote --heads origin "$BRANCH" | wc -l)

          if [ "$REMOTE_EXISTS" -eq 0 ]; then
            # Branch does not exist — create it from master
            git checkout -b "$BRANCH"
          else
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"

            # Try to merge latest master; on conflict, recreate the branch
            if ! git merge origin/master --no-edit; then
              git merge --abort
              git checkout master
              git branch -D "$BRANCH"
              git push origin --delete "$BRANCH"
              git checkout -b "$BRANCH"
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch latest CSV data
        run: |
          python -c "from campus_nav.utils import fetch_csv_from_google_sheet; fetch_csv_from_google_sheet()"

      - name: Normalise CSV files
        run: |
          python -c "from campus_nav.utils import normalise_csv_data; normalise_csv_data()"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet HEAD -- campus_nav/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up if no changes
        if: steps.diff.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any open PR for this branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            gh pr close "$PR_NUMBER" --delete-branch
          fi

          # Delete remote branch if it exists
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            git push origin --delete "$BRANCH"
          fi

          echo "No data changes — branch and PR cleaned up."

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          COMMIT_DATE=$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d')

          git add campus_nav/data/*.csv
          git commit -m "chore: update CSV data ($COMMIT_DATE)"
          git push -u origin "$BRANCH"

      - name: Open PR if needed
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "[chore, ci-auto] Update CSV Data (Automated)" \
              --body "Automated daily CSV refresh from Google Sheets."
          fi
